<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" width="900" height="240">
  <defs>
    <style>
      @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
      @keyframes type1 { 0%{width:0} 8%{width:300px} 75%{width:300px} 82%{width:0} 100%{width:0} }
      @keyframes type2 { 0%{width:0} 8%{width:0} 18%{width:380px} 75%{width:380px} 82%{width:0} 100%{width:0} }
      @keyframes type3 { 0%{width:0} 18%{width:0} 28%{width:450px} 75%{width:450px} 82%{width:0} 100%{width:0} }
      @keyframes type4 { 0%{width:0} 28%{width:0} 38%{width:340px} 75%{width:340px} 82%{width:0} 100%{width:0} }
      @keyframes type5 { 0%{width:0} 38%{width:0} 48%{width:460px} 75%{width:460px} 82%{width:0} 100%{width:0} }
      @keyframes type6 { 0%{width:0} 48%{width:0} 58%{width:230px} 75%{width:230px} 82%{width:0} 100%{width:0} }
      @keyframes cursorMove { 0%,58%{opacity:1} 59%,100%{opacity:0} }
      @keyframes finalCursor { 0%,82%{opacity:0} 83%,100%{opacity:1} }
      @keyframes lineFade { 0%,75%{opacity:1} 82%,100%{opacity:0} }
      @keyframes finalText { 0%,82%{opacity:0} 83%{opacity:0;transform:translateY(10px)} 90%{opacity:1;transform:translateY(0)} 100%{opacity:1;transform:translateY(0)} }
      .c1 { animation: type1 12s ease-in-out infinite }
      .c2 { animation: type2 12s ease-in-out infinite }
      .c3 { animation: type3 12s ease-in-out infinite }
      .c4 { animation: type4 12s ease-in-out infinite }
      .c5 { animation: type5 12s ease-in-out infinite }
      .c6 { animation: type6 12s ease-in-out infinite }
      .lfade { animation: lineFade 12s ease-in-out infinite }
      .ftext { animation: finalText 12s ease-in-out infinite }
      .fcursor { animation: finalCursor 12s step-end infinite }
      .typecursor { animation: cursorMove 12s step-end infinite }
    </style>
    <clipPath id="c1"><rect class="c1" x="0" y="0" height="22" fill="white"/></clipPath>
    <clipPath id="c2"><rect class="c2" x="0" y="0" height="22" fill="white"/></clipPath>
    <clipPath id="c3"><rect class="c3" x="0" y="0" height="22" fill="white"/></clipPath>
    <clipPath id="c4"><rect class="c4" x="0" y="0" height="22" fill="white"/></clipPath>
    <clipPath id="c5"><rect class="c5" x="0" y="0" height="22" fill="white"/></clipPath>
    <clipPath id="c6"><rect class="c6" x="0" y="0" height="22" fill="white"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="240" fill="#0a0a0a" rx="10"/>
  <rect x="3" y="3" width="894" height="234" fill="none" stroke="#3a0a0a" stroke-width="2" rx="8"/>
  <rect x="6" y="6" width="888" height="228" fill="none" stroke="rgba(248,0,0,0.04)" stroke-width="1" rx="6"/>

  <!-- Scanlines -->
  <g opacity="0.03">
    <pattern id="sl" width="3" height="3" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="3" y2="0" stroke="#f80000" stroke-width="1"/>
    </pattern>
    <rect width="900" height="240" fill="url(#sl)"/>
  </g>

  <!-- Title bar -->
  <rect x="30" y="15" width="840" height="28" fill="#111" rx="4"/>
  <circle cx="48" cy="29" r="5" fill="#ff5555"/>
  <circle cx="66" cy="29" r="5" fill="#ffaa33"/>
  <circle cx="84" cy="29" r="5" fill="#55cc55"/>
  <text x="450" y="34" text-anchor="middle" fill="#666" font-family="'Courier New',monospace" font-size="11" font-weight="bold">0xVSTVB0Y — ORACLE TERMINAL v2.4.1</text>
  <text x="800" y="34" text-anchor="end" fill="#444" font-family="'Courier New',monospace" font-size="10">bash 5.2</text>

  <!-- Typing lines (all fade out after sequence) -->
  <g class="lfade">
    <!-- Line 1 -->
    <g clip-path="url(#c1)">
      <text x="50" y="75" fill="#f80000" font-family="'Courier New',monospace" font-size="16" font-weight="bold">vstvb0y@oracle:~$</text>
      <text x="280" y="75" fill="#ffcc00" font-family="'Courier New',monospace" font-size="16">cat profile.txt</text>
    </g>
    <!-- Line 2 -->
    <g clip-path="url(#c2)">
      <text x="50" y="103" fill="#888" font-family="'Courier New',monospace" font-size="15">[</text>
      <text x="62" y="103" fill="#f80000" font-family="'Courier New',monospace" font-size="15" font-weight="bold">OK</text>
      <text x="92" y="103" fill="#888" font-family="'Courier New',monospace" font-size="15">]</text>
      <text x="110" y="103" fill="#fff" font-family="'Courier New',monospace" font-size="15">Mohamed A. Abdelkhaleq</text>
    </g>
    <!-- Line 3 -->
    <g clip-path="url(#c3)">
      <text x="50" y="128" fill="#888" font-family="'Courier New',monospace" font-size="15">[</text>
      <text x="62" y="128" fill="#f80000" font-family="'Courier New',monospace" font-size="15" font-weight="bold">OK</text>
      <text x="92" y="128" fill="#888" font-family="'Courier New',monospace" font-size="15">]</text>
      <text x="110" y="128" fill="#ddd" font-family="'Courier New',monospace" font-size="15">Fusion Middleware Engineer</text>
    </g>
    <!-- Line 4 -->
    <g clip-path="url(#c4)">
      <text x="50" y="153" fill="#888" font-family="'Courier New',monospace" font-size="15">[</text>
      <text x="62" y="153" fill="#f80000" font-family="'Courier New',monospace" font-size="15" font-weight="bold">OK</text>
      <text x="92" y="153" fill="#888" font-family="'Courier New',monospace" font-size="15">]</text>
      <text x="110" y="153" fill="#ffcc00" font-family="'Courier New',monospace" font-size="15">Oracle ACE Associate</text>
    </g>
    <!-- Line 5 -->
    <g clip-path="url(#c5)">
      <text x="50" y="178" fill="#888" font-family="'Courier New',monospace" font-size="15">[</text>
      <text x="62" y="178" fill="#f80000" font-family="'Courier New',monospace" font-size="15" font-weight="bold">OK</text>
      <text x="92" y="178" fill="#888" font-family="'Courier New',monospace" font-size="15">]</text>
      <text x="110" y="178" fill="#ddd" font-family="'Courier New',monospace" font-size="15">Stack: OCI · WebLogic 12c/14c · SOA · OSB</text>
    </g>
    <!-- Line 6 -->
    <g clip-path="url(#c6)">
      <text x="50" y="203" fill="#00cc66" font-family="'Courier New',monospace" font-size="15">[</text>
      <text x="62" y="203" fill="#00cc66" font-family="'Courier New',monospace" font-size="15" font-weight="bold">DONE</text>
      <text x="110" y="203" fill="#00cc66" font-family="'Courier New',monospace" font-size="15">System ready — Profile loaded successfully</text>
    </g>
  </g>

  <!-- Typing cursor -->
  <rect x="280" y="78" width="10" height="15" fill="#ffcc00" class="typecursor" rx="1"/>

  <!-- Final persistent state after sequence -->
  <g class="ftext">
    <text x="50" y="103" fill="#f80000" font-family="'Courier New',monospace" font-size="14" font-weight="bold">vstvb0y@oracle:~$</text>
    <text x="210" y="103" fill="#ffcc00" font-family="'Courier New',monospace" font-size="14">whoami</text>
    <text x="50" y="135" fill="#fff" font-family="'Courier New',monospace" font-size="16" font-weight="bold">Mohamed A. Abdelkhaleq</text>
    <text x="50" y="162" fill="#aaa" font-family="'Courier New',monospace" font-size="14">Fusion Middleware Engineer · Oracle ACE Associate</text>
    <text x="50" y="189" fill="#888" font-family="'Courier New',monospace" font-size="13">OCI · WebLogic 12c/14c · SOA · OSB · Docker · Python · Git</text>
    <!-- Final cursor -->
    <rect x="280" y="106" width="10" height="15" fill="#ffcc00" class="fcursor" rx="1"/>
  </g>
</svg>
