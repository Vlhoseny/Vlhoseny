<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 160" width="700" height="160">
  <defs>
    <style>
      @keyframes slither {
        0% { transform: translate(0, 0); }
        25% { transform: translate(30px, -10px); }
        50% { transform: translate(60px, 0); }
        75% { transform: translate(30px, 10px); }
        100% { transform: translate(0, 0); }
      }
      @keyframes eat {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      @keyframes glow {
        0%, 100% { filter: drop-shadow(0 0 2px #4ade80); }
        50% { filter: drop-shadow(0 0 8px #4ade80); }
      }
      .snake-body { animation: slither 3s ease-in-out infinite; }
      .snake-head { animation: glow 1s ease-in-out infinite; }
      .food { animation: eat 0.8s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="700" height="160" fill="#0d1117" rx="8"/>

  <!-- Grid dots -->
  <g fill="#1a2332">
    <circle cx="50" cy="30" r="3"/><circle cx="90" cy="30" r="3"/><circle cx="130" cy="30" r="3"/>
    <circle cx="170" cy="30" r="3"/><circle cx="210" cy="30" r="3"/><circle cx="250" cy="30" r="3"/>
    <circle cx="290" cy="30" r="3"/><circle cx="330" cy="30" r="3"/><circle cx="370" cy="30" r="3"/>
    <circle cx="410" cy="30" r="3"/><circle cx="450" cy="30" r="3"/><circle cx="490" cy="30" r="3"/>
    <circle cx="530" cy="30" r="3"/><circle cx="570" cy="30" r="3"/><circle cx="610" cy="30" r="3"/>
    <circle cx="650" cy="30" r="3"/>

    <circle cx="50" cy="60" r="3"/><circle cx="90" cy="60" r="3"/><circle cx="130" cy="60" r="3"/>
    <circle cx="170" cy="60" r="3"/><circle cx="210" cy="60" r="3"/><circle cx="250" cy="60" r="3"/>
    <circle cx="290" cy="60" r="3"/><circle cx="330" cy="60" r="3"/><circle cx="370" cy="60" r="3"/>
    <circle cx="410" cy="60" r="3"/><circle cx="450" cy="60" r="3"/><circle cx="490" cy="60" r="3"/>
    <circle cx="530" cy="60" r="3"/><circle cx="570" cy="60" r="3"/><circle cx="610" cy="60" r="3"/>
    <circle cx="650" cy="60" r="3"/>

    <circle cx="50" cy="90" r="3"/><circle cx="90" cy="90" r="3"/><circle cx="130" cy="90" r="3"/>
    <circle cx="170" cy="90" r="3"/><circle cx="210" cy="90" r="3"/><circle cx="250" cy="90" r="3"/>
    <circle cx="290" cy="90" r="3"/><circle cx="330" cy="90" r="3"/><circle cx="370" cy="90" r="3"/>
    <circle cx="410" cy="90" r="3"/><circle cx="450" cy="90" r="3"/><circle cx="490" cy="90" r="3"/>
    <circle cx="530" cy="90" r="3"/><circle cx="570" cy="90" r="3"/><circle cx="610" cy="90" r="3"/>
    <circle cx="650" cy="90" r="3"/>

    <circle cx="50" cy="120" r="3"/><circle cx="90" cy="120" r="3"/><circle cx="130" cy="120" r="3"/>
    <circle cx="170" cy="120" r="3"/><circle cx="210" cy="120" r="3"/><circle cx="250" cy="120" r="3"/>
    <circle cx="290" cy="120" r="3"/><circle cx="330" cy="120" r="3"/><circle cx="370" cy="120" r="3"/>
    <circle cx="410" cy="120" r="3"/><circle cx="450" cy="120" r="3"/><circle cx="490" cy="120" r="3"/>
    <circle cx="530" cy="120" r="3"/><circle cx="570" cy="120" r="3"/><circle cx="610" cy="120" r="3"/>
    <circle cx="650" cy="120" r="3"/>
  </g>

  <!-- Snake body -->
  <g class="snake-body">
    <rect x="120" y="55" width="28" height="28" rx="4" fill="#22c55e" opacity="0.4"/>
    <rect x="150" y="55" width="28" height="28" rx="4" fill="#22c55e" opacity="0.5"/>
    <rect x="180" y="55" width="28" height="28" rx="4" fill="#22c55e" opacity="0.6"/>
    <rect x="210" y="55" width="28" height="28" rx="4" fill="#22c55e" opacity="0.7"/>
    <rect x="240" y="55" width="28" height="28" rx="4" fill="#22c55e" opacity="0.8"/>
    <rect x="270" y="55" width="28" height="28" rx="4" fill="#22c55e" opacity="0.9"/>
  </g>

  <!-- Snake head -->
  <g class="snake-head">
    <rect x="300" y="55" width="28" height="28" rx="5" fill="#4ade80"/>
    <circle cx="315" cy="65" r="3" fill="#0d1117"/>
    <circle cx="315" cy="78" r="3" fill="#0d1117"/>
    <rect x="325" y="66" width="6" height="6" rx="2" fill="#ff4444"/>
  </g>

  <!-- Food (skills the snake eats) -->
  <g class="food" style="animation-delay: 0s">
    <rect x="80" y="85" width="16" height="16" rx="3" fill="#f97316"/>
    <text x="88" y="96" fill="#fff" font-size="8" text-anchor="middle" font-weight="bold">O</text>
  </g>
  <g class="food" style="animation-delay: 0.5s">
    <rect x="350" y="25" width="16" height="16" rx="3" fill="#a855f7"/>
    <text x="358" y="36" fill="#fff" font-size="7" text-anchor="middle" font-weight="bold">W</text>
  </g>
  <g class="food" style="animation-delay: 1s">
    <rect x="500" y="85" width="16" height="16" rx="3" fill="#3b82f6"/>
    <text x="508" y="96" fill="#fff" font-size="7" text-anchor="middle" font-weight="bold">P</text>
  </g>
  <g class="food" style="animation-delay: 1.5s">
    <rect x="200" y="25" width="16" height="16" rx="3" fill="#22d3ee"/>
    <text x="208" y="36" fill="#fff" font-size="7" text-anchor="middle" font-weight="bold">D</text>
  </g>
  <g class="food" style="animation-delay: 2s">
    <rect x="580" y="115" width="16" height="16" rx="3" fill="#eab308"/>
    <text x="588" y="126" fill="#fff" font-size="7" text-anchor="middle" font-weight="bold">S</text>
  </g>
  <g class="food" style="animation-delay: 2.5s">
    <rect x="420" y="55" width="16" height="16" rx="3" fill="#ef4444"/>
    <text x="428" y="66" fill="#fff" font-size="7" text-anchor="middle" font-weight="bold">G</text>
  </g>

  <!-- Score -->
  <text x="20" y="145" fill="#8b949e" font-family="monospace" font-size="11">SCORE: 1240</text>
  <text x="580" y="145" fill="#8b949e" font-family="monospace" font-size="11">LENGTH: 7</text>
</svg>
