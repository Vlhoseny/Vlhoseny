<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>0xVSTVB0Y Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  .game-wrapper {
    background: #111144;
    padding: 30px;
    border-radius: 16px;
    border: 2px solid #ffcc00;
    box-shadow: 0 0 40px rgba(255, 204, 0, 0.15);
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding: 0 5px;
  }
  .title {
    color: #ffcc00;
    font-size: 18px;
    letter-spacing: 3px;
    text-shadow: 0 0 10px rgba(255, 204, 0, 0.5);
  }
  .hud {
    display: flex;
    gap: 25px;
  }
  .hud-item {
    color: #44ddff;
    font-size: 14px;
    letter-spacing: 1px;
  }
  .hud-item span { color: #fff; }
  canvas {
    display: block;
    border: 2px solid #2244aa;
    border-radius: 8px;
    background: #0d0d35;
    box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
  }
  .controls {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 15px;
  }
  .btn {
    background: #2244aa;
    color: #fff;
    border: 1px solid #4466cc;
    padding: 8px 20px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .btn:hover {
    background: #4466cc;
    box-shadow: 0 0 15px rgba(68, 102, 204, 0.5);
    transform: translateY(-1px);
  }
  .status {
    color: #8888ff;
    font-size: 13px;
    letter-spacing: 1px;
  }
  .status .highlight { color: #ffcc00; }
  .mobile-controls {
    display: none;
    grid-template-columns: 60px 60px 60px;
    grid-template-rows: 60px 60px 60px;
    gap: 5px;
    margin-top: 15px;
    justify-content: center;
  }
  .mobile-btn {
    width: 60px; height: 60px;
    background: #1a1a5e;
    border: 1px solid #4466cc;
    border-radius: 10px;
    color: #ffcc00;
    font-size: 24px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
  }
  .mobile-btn:active { background: #4466cc; }
  .mobile-btn.up { grid-column: 2; grid-row: 1; }
  .mobile-btn.left { grid-column: 1; grid-row: 2; }
  .mobile-btn.right { grid-column: 3; grid-row: 2; }
  .mobile-btn.down { grid-column: 2; grid-row: 3; }

  @media (max-width: 600px) {
    .game-wrapper { padding: 15px; }
    .title { font-size: 13px; }
    .hud-item { font-size: 11px; }
    .mobile-controls { display: grid; }
  }
  @media (pointer: coarse) {
    .mobile-controls { display: grid; }
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="header">
    <div class="title">0xVSTVB0Y // SNAKE</div>
    <div class="hud">
      <div class="hud-item">SCORE: <span id="score">0</span></div>
      <div class="hud-item">HIGH: <span id="highScore">0</span></div>
    </div>
  </div>
  <canvas id="game" width="400" height="400"></canvas>
  <div class="controls">
    <button class="btn" id="restartBtn">⟳ RESTART</button>
    <div class="status">PRESS <span class="highlight">SPACE</span> OR <span class="highlight">TAP</span> TO START</div>
    <button class="btn" onclick="window.open('https://github.com/Vlhoseny')">⚡ GITHUB</button>
  </div>
  <div class="mobile-controls">
    <button class="mobile-btn up" data-dir="up">▲</button>
    <button class="mobile-btn left" data-dir="left">◀</button>
    <button class="mobile-btn right" data-dir="right">▶</button>
    <button class="mobile-btn down" data-dir="down">▼</button>
  </div>
</div>

<script>
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const highScoreEl = document.getElementById('highScore');
  const statusEl = document.querySelector('.status');

  const GRID = 20;
  const SIZE = canvas.width / GRID;

  let snake, direction, nextDirection, food, score, highScore;
  let gameLoop, gameRunning, gameOver;
  let powerUp = null;

  // Skills as food
  const skills = ['OCI', 'PY', 'JS', 'WL', 'DK', 'LN', 'SQL', 'SEC', 'QA', 'GIT'];

  function reset() {
    snake = [
      {x: 10, y: 10},
      {x: 9, y: 10},
      {x: 8, y: 10}
    ];
    direction = {x: 1, y: 0};
    nextDirection = {x: 1, y: 0};
    score = 0;
    gameOver = false;
    powerUp = null;
    spawnFood();
    scoreEl.textContent = '0';
    statusEl.innerHTML = '🥶 PLAYING...';
  }

  function spawnFood() {
    let pos;
    do {
      pos = {
        x: Math.floor(Math.random() * GRID),
        y: Math.floor(Math.random() * GRID)
      };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y));
    food = {
      ...pos,
      skill: skills[Math.floor(Math.random() * skills.length)],
      color: ['#ffcc00','#44ddff','#ff6688','#66ff88','#ff9900','#aa66ff'][Math.floor(Math.random() * 6)]
    };
  }

  function spawnPowerUp() {
    if (powerUp) return;
    let pos;
    do {
      pos = {
        x: Math.floor(Math.random() * GRID),
        y: Math.floor(Math.random() * GRID)
      };
    } while (snake.some(s => s.x === pos.x && s.y === pos.y) || (pos.x === food.x && pos.y === food.y));
    powerUp = {
      ...pos,
      type: Math.random() > 0.5 ? '2x' : 'ghost',
      timer: 100
    };
  }

  function update() {
    if (gameOver || !gameRunning) return;

    direction = {...nextDirection};
    const head = {
      x: snake[0].x + direction.x,
      y: snake[0].y + direction.y
    };

    // Wrap around
    if (head.x < 0) head.x = GRID - 1;
    if (head.x >= GRID) head.x = 0;
    if (head.y < 0) head.y = GRID - 1;
    if (head.y >= GRID) head.y = 0;

    // Self collision
    if (snake.some(s => s.x === head.x && s.y === head.y)) {
      gameOver = true;
      gameRunning = false;
      statusEl.innerHTML = '💀 GAME OVER! PRESS <span class="highlight">SPACE</span> TO RESTART';
      clearInterval(gameLoop);
      return;
    }

    snake.unshift(head);

    // Eat food
    if (head.x === food.x && head.y === food.y) {
      score += 10;
      scoreEl.textContent = score;
      if (score > highScore) {
        highScore = score;
        highScoreEl.textContent = highScore;
      }
      spawnFood();
      if (Math.random() < 0.2) spawnPowerUp();
    } else {
      snake.pop();
    }

    // Eat power-up
    if (powerUp && head.x === powerUp.x && head.y === powerUp.y) {
      if (powerUp.type === '2x') score += 20;
      else snake.push({...snake[snake.length-1]});
      scoreEl.textContent = score;
      if (score > highScore) {
        highScore = score;
        highScoreEl.textContent = highScore;
      }
      powerUp = null;
    }

    if (powerUp) {
      powerUp.timer--;
      if (powerUp.timer <= 0) powerUp = null;
    }
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Grid
    ctx.strokeStyle = '#1a1a4e';
    ctx.lineWidth = 0.5;
    for (let i = 0; i <= GRID; i++) {
      ctx.beginPath();
      ctx.moveTo(i * SIZE, 0);
      ctx.lineTo(i * SIZE, canvas.height);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * SIZE);
      ctx.lineTo(canvas.width, i * SIZE);
      ctx.stroke();
    }

    // Snake
    snake.forEach((seg, i) => {
      const ratio = 1 - (i / snake.length) * 0.5;
      const g = Math.floor(180 + 75 * ratio);
      const r = Math.floor(30 * ratio);
      ctx.fillStyle = `rgb(${r}, ${g}, ${r})`;
      ctx.shadowColor = '#4ade80';
      ctx.shadowBlur = i === 0 ? 12 : 4;
      const pad = 1;
      ctx.beginPath();
      ctx.roundRect(seg.x * SIZE + pad, seg.y * SIZE + pad, SIZE - pad*2, SIZE - pad*2, i === 0 ? 5 : 3);
      ctx.fill();

      // Eyes on head
      if (i === 0) {
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#000';
        let ex1, ey1, ex2, ey2;
        if (direction.x === 1) { ex1 = 13; ey1 = 5; ex2 = 13; ey2 = 13; }
        else if (direction.x === -1) { ex1 = 5; ey1 = 5; ex2 = 5; ey2 = 13; }
        else if (direction.y === -1) { ex1 = 5; ey1 = 5; ex2 = 13; ey2 = 5; }
        else { ex1 = 5; ey1 = 13; ex2 = 13; ey2 = 13; }
        ctx.beginPath();
        ctx.arc(seg.x * SIZE + ex1, seg.y * SIZE + ey1, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(seg.x * SIZE + ex2, seg.y * SIZE + ey2, 2.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(seg.x * SIZE + ex1 + 1, seg.y * SIZE + ey1 - 1, 1, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(seg.x * SIZE + ex2 + 1, seg.y * SIZE + ey2 - 1, 1, 0, Math.PI * 2);
        ctx.fill();
      }
    });
    ctx.shadowBlur = 0;

    // Food
    const fSize = SIZE - 4;
    ctx.shadowColor = food.color;
    ctx.shadowBlur = 10;
    ctx.fillStyle = food.color;
    ctx.beginPath();
    ctx.roundRect(food.x * SIZE + 2, food.y * SIZE + 2, fSize, fSize, 4);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#000';
    ctx.font = `bold ${SIZE * 0.4}px monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(food.skill, food.x * SIZE + SIZE/2, food.y * SIZE + SIZE/2);

    // Power-up
    if (powerUp) {
      ctx.shadowColor = '#ffcc00';
      ctx.shadowBlur = 15;
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath();
      ctx.arc(powerUp.x * SIZE + SIZE/2, powerUp.y * SIZE + SIZE/2, SIZE/2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#000';
      ctx.font = `bold ${SIZE * 0.35}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(powerUp.type === '2x' ? '×2' : '🐍', powerUp.x * SIZE + SIZE/2, powerUp.y * SIZE + SIZE/2);
    }

    // Game Over overlay
    if (gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 36px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur = 20;
      ctx.fillText('GAME OVER', canvas.width/2, canvas.height/2 - 15);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#8888ff';
      ctx.font = '16px monospace';
      ctx.fillText(`FINAL SCORE: ${score}`, canvas.width/2, canvas.height/2 + 30);
    } else if (!gameRunning) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#ffcc00';
      ctx.font = 'bold 24px monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.shadowColor = '#ffcc00';
      ctx.shadowBlur = 20;
      ctx.fillText('PRESS SPACE', canvas.width/2, canvas.height/2);
      ctx.shadowBlur = 0;
    }
  }

  // roundRect polyfill
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (r > w/2) r = w/2;
      if (r > h/2) r = h/2;
      this.moveTo(x + r, y);
      this.lineTo(x + w - r, y);
      this.quadraticCurveTo(x + w, y, x + w, y + r);
      this.lineTo(x + w, y + h - r);
      this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      this.lineTo(x + r, y + h);
      this.quadraticCurveTo(x, y + h, x, y + h - r);
      this.lineTo(x, y + r);
      this.quadraticCurveTo(x, y, x + r, y);
      return this;
    };
  }

  function gameStep() {
    update();
    draw();
  }

  function startGame() {
    if (gameOver) {
      reset();
    }
    if (gameLoop) clearInterval(gameLoop);
    gameRunning = true;
    statusEl.innerHTML = '🥶 PLAYING...';
    gameLoop = setInterval(gameStep, 120);
  }

  // High score from localStorage
  highScore = parseInt(localStorage.getItem('snakeHighScore')) || 0;
  highScoreEl.textContent = highScore;

  // Init
  gameRunning = false;
  reset();
  draw();

  // Events
  document.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'Space') {
      e.preventDefault();
      if (gameOver) { reset(); startGame(); }
      else if (!gameRunning) startGame();
      return;
    }
    if (!gameRunning) return;
    const map = {
      'ArrowUp': {x: 0, y: -1},
      'ArrowDown': {x: 0, y: 1},
      'ArrowLeft': {x: -1, y: 0},
      'ArrowRight': {x: 1, y: 0}
    };
    const d = map[e.key];
    if (d && (d.x !== -direction.x || d.y !== -direction.y)) {
      e.preventDefault();
      nextDirection = d;
    }
  });

  // Mobile controls
  document.querySelectorAll('.mobile-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (gameOver) { reset(); startGame(); return; }
      if (!gameRunning) { startGame(); return; }
      const map = {
        'up': {x: 0, y: -1},
        'down': {x: 0, y: 1},
        'left': {x: -1, y: 0},
        'right': {x: 1, y: 0}
      };
      const d = map[btn.dataset.dir];
      if (d && (d.x !== -direction.x || d.y !== -direction.y)) {
        nextDirection = d;
      }
    });
  });

  // Touch/click to start
  canvas.addEventListener('click', () => {
    if (!gameRunning || gameOver) {
      if (gameOver) reset();
      startGame();
    }
  });

  document.getElementById('restartBtn').addEventListener('click', () => {
    reset();
    if (gameLoop) clearInterval(gameLoop);
    gameRunning = false;
    draw();
    statusEl.innerHTML = 'PRESS <span class="highlight">SPACE</span> OR <span class="highlight">CLICK</span> TO START';
  });

  // Save high score on close
  window.addEventListener('beforeunload', () => {
    localStorage.setItem('snakeHighScore', Math.max(highScore, score));
  });
</script>
</body>
</html>
