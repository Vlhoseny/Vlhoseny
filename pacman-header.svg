<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 280" width="900" height="280">
  <defs>
    <style>
      @keyframes walk {
        0% { transform: translateX(-60px); }
        100% { transform: translateX(920px); }
      }
      @keyframes chomp {
        0%, 100% { d: path("M30,30 A30,30 0 1,1 30,70 L50,50 Z"); }
        50% { d: path("M30,30 A30,30 0 1,1 30,70 L30,50 Z"); }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0; }
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      @keyframes ghostFloat {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-4px); }
      }
      @keyframes pulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
      @keyframes scorePop {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.3); opacity: 0.8; }
        100% { transform: scale(1); opacity: 1; }
      }
      .pacman-group { animation: walk 4s linear infinite; }
      .pacman-body { animation: chomp 0.25s ease-in-out infinite; }
      .ghost1 { animation: ghostFloat 0.8s ease-in-out infinite; }
      .ghost2 { animation: ghostFloat 1s ease-in-out infinite 0.2s; }
      .ghost3 { animation: ghostFloat 0.9s ease-in-out infinite 0.4s; }
      .dot { animation: pulse 0.6s ease-in-out infinite; }
      .score-text { animation: scorePop 2s ease-in-out infinite; }
      .title-glow { animation: pulse 1.5s ease-in-out infinite; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="#0a0a2e" rx="8"/>
  <rect x="10" y="10" width="880" height="260" fill="none" stroke="#1a1a4e" stroke-width="2" rx="6"/>

  <!-- Scanline effect -->
  <pattern id="scanlines" width="4" height="4" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="4" y2="0" stroke="rgba(255,255,255,0.02)" stroke-width="1"/>
  </pattern>
  <rect width="900" height="280" fill="url(#scanlines)"/>

  <!-- Title -->
  <text x="450" y="42" text-anchor="middle" fill="#ffcc00" font-family="monospace" font-size="22" font-weight="bold" letter-spacing="4" class="title-glow">0xVSTVB0Y // PLAYER PROFILE</text>

  <!-- Maze walls -->
  <rect x="50" y="60" width="800" height="6" fill="#2244aa" rx="3"/>
  <rect x="50" y="60" width="6" height="200" fill="#2244aa" rx="3"/>
  <rect x="50" y="254" width="800" height="6" fill="#2244aa" rx="3"/>
  <rect x="844" y="60" width="6" height="200" fill="#2244aa" rx="3"/>

  <!-- Maze inner walls -->
  <rect x="120" y="100" width="6" height="80" fill="#1a3a8a" rx="2"/>
  <rect x="200" y="140" width="100" height="6" fill="#1a3a8a" rx="2"/>
  <rect x="380" y="100" width="6" height="100" fill="#1a3a8a" rx="2"/>
  <rect x="500" y="80" width="120" height="6" fill="#1a3a8a" rx="2"/>
  <rect x="620" y="130" width="6" height="100" fill="#1a3a8a" rx="2"/>
  <rect x="250" y="190" width="160" height="6" fill="#1a3a8a" rx="2"/>
  <rect x="700" y="100" width="100" height="6" fill="#1a3a8a" rx="2"/>

  <!-- Dots -->
  <circle cx="100" cy="85" r="4" fill="#ffcc00" class="dot" style="animation-delay: 0s"/>
  <circle cx="160" cy="85" r="4" fill="#ffcc00" class="dot" style="animation-delay: 0.1s"/>
  <circle cx="220" cy="85" r="4" fill="#ffcc00" class="dot" style="animation-delay: 0.2s"/>
  <circle cx="280" cy="85" r="4" fill="#ffcc00" class="dot" style="animation-delay: 0.15s"/>
  <circle cx="340" cy="85" r="4" fill="#ffcc00" class="dot" style="animation-delay: 0.25s"/>
  <circle cx="100" cy="130" r="4" fill="#ffcc00" class="dot" style="animation-delay: 0.05s"/>
  <circle cx="160" cy="170" r="4" fill="#ffcc00" class="dot" style="animation-delay: 0.3s"/>
  <circle cx="340" cy="170" r="4" fill="#ffcc00" class="dot" style="animation-delay: 0.1s"/>
  <circle cx="440" cy="130" r="4" fill="#ffcc00" class="dot" style="animation-delay: 0.2s"/>
  <circle cx="500" cy="170" r="4" fill="#ffcc00" class="dot" style="animation-delay: 0.35s"/>
  <circle cx="580" cy="130" r="4" fill="#ffcc00" class="dot" style="animation-delay: 0.15s"/>
  <circle cx="700" cy="130" r="4" fill="#ffcc00" class="dot" style="animation-delay: 0.25s"/>
  <circle cx="760" cy="85" r="4" fill="#ffcc00" class="dot" style="animation-delay: 0.3s"/>
  <circle cx="760" cy="170" r="4" fill="#ffcc00" class="dot" style="animation-delay: 0.1s"/>
  <circle cx="440" cy="210" r="4" fill="#ffcc00" class="dot" style="animation-delay: 0.4s"/>
  <circle cx="580" cy="210" r="4" fill="#ffcc00" class="dot" style="animation-delay: 0.2s"/>

  <!-- Power pellets (larger dots) -->
  <circle cx="80" cy="85" r="8" fill="#ff9900" class="dot" style="animation-delay: 0s"/>
  <circle cx="800" cy="85" r="8" fill="#ff9900" class="dot" style="animation-delay: 0.3s"/>
  <circle cx="80" cy="210" r="8" fill="#ff9900" class="dot" style="animation-delay: 0.15s"/>
  <circle cx="800" cy="210" r="8" fill="#ff9900" class="dot" style="animation-delay: 0.45s"/>

  <!-- Skill labels on dots -->
  <text x="100" y="80" fill="#8888ff" font-family="monospace" font-size="8" text-anchor="middle" class="dot">OCI</text>
  <text x="340" y="80" fill="#8888ff" font-family="monospace" font-size="8" text-anchor="middle" class="dot">WebLogic</text>
  <text x="500" y="165" fill="#8888ff" font-family="monospace" font-size="8" text-anchor="middle" class="dot">Python</text>
  <text x="700" y="125" fill="#8888ff" font-family="monospace" font-size="8" text-anchor="middle" class="dot">Docker</text>

  <!-- Pac-Man character -->
  <g class="pacman-group">
    <path class="pacman-body" fill="#ffcc00" d="M30,30 A30,30 0 1,1 30,70 L50,50 Z"/>
    <circle cx="22" cy="40" r="3" fill="#000"/>
  </g>

  <!-- Ghosts -->
  <g class="ghost1">
    <path d="M640,180 Q640,160 655,160 Q670,160 670,180 L670,200 L655,195 L640,200 Z" fill="#ff4444"/>
    <circle cx="648" cy="175" r="4" fill="white"/>
    <circle cx="662" cy="175" r="4" fill="white"/>
    <circle cx="649" cy="176" r="2" fill="#222"/>
    <circle cx="663" cy="176" r="2" fill="#222"/>
  </g>
  <g class="ghost2">
    <path d="M480,170 Q480,150 495,150 Q510,150 510,170 L510,190 L495,185 L480,190 Z" fill="#ffb8ff"/>
    <circle cx="488" cy="165" r="4" fill="white"/>
    <circle cx="502" cy="165" r="4" fill="white"/>
    <circle cx="489" cy="166" r="2" fill="#222"/>
    <circle cx="503" cy="166" r="2" fill="#222"/>
  </g>
  <g class="ghost3">
    <path d="M230,120 Q230,100 245,100 Q260,100 260,120 L260,140 L245,135 L230,140 Z" fill="#44ddff"/>
    <circle cx="238" cy="115" r="4" fill="white"/>
    <circle cx="252" cy="115" r="4" fill="white"/>
    <circle cx="239" cy="116" r="2" fill="#222"/>
    <circle cx="253" cy="116" r="2" fill="#222"/>
  </g>

  <!-- Score HUD -->
  <rect x="60" y="235" width="120" height="22" fill="#111" stroke="#ffcc00" stroke-width="1" rx="3"/>
  <text x="65" y="250" fill="#ffcc00" font-family="monospace" font-size="11">SCORE: 41280</text>

  <rect x="200" y="235" width="100" height="22" fill="#111" stroke="#ffcc00" stroke-width="1" rx="3"/>
  <text x="205" y="250" fill="#ffcc00" font-family="monospace" font-size="11">LEVEL: 7</text>

  <rect x="320" y="235" width="80" height="22" fill="#111" stroke="#ffcc00" stroke-width="1" rx="3"/>
  <text x="325" y="250" fill="#ffcc00" font-family="monospace" font-size="11">LIVES: 3</text>

  <!-- High Score -->
  <text x="600" y="250" fill="#8888ff" font-family="monospace" font-size="10">HIGH SCORE: 99999</text>

  <!-- Register at bottom -->
  <text x="450" y="270" text-anchor="middle" fill="#4444aa" font-family="monospace" font-size="9">© 2026 0xVSTVB0Y // GAME ON</text>
</svg>
